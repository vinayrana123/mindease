<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics | MindEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="analytics" class="app-shell">
    <div id="toast" class="hidden"></div>
    <main class="mx-auto max-w-7xl px-5 py-8 lg:px-8">
      <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-sm uppercase tracking-[0.24em] text-slate-500">Progress analytics</p>
          <h1 class="font-display text-4xl font-semibold">See your patterns before they become problems.</h1>
        </div>
        <div class="flex gap-3">
          <button data-theme-toggle class="btn-secondary text-sm">Theme</button>
          <a href="./dashboard.html" class="btn-primary text-sm">Dashboard</a>
        </div>
      </div>
      <section class="page-grid cols-2">
        <article class="glass well-card p-6">
          <div class="mb-5 flex items-center justify-between">
            <div>
              <p class="text-sm text-slate-500">Sleep and wellness score</p>
              <h2 class="text-2xl font-semibold">Recovery trend</h2>
            </div>
            <span class="pill" data-wellness-score></span>
          </div>
          <div class="chart-wrap"><canvas id="moodTrendChart"></canvas></div>
        </article>
        <article class="glass well-card p-6">
          <div class="mb-5 flex items-center justify-between">
            <div>
              <p class="text-sm text-slate-500">Stress vs anxiety</p>
              <h2 class="text-2xl font-semibold">Emotional load</h2>
            </div>
            <span class="pill" data-streak></span>
          </div>
          <div class="chart-wrap"><canvas id="stressChart"></canvas></div>
        </article>
      </section>
    </main>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>
