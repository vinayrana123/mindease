<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | MindEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="forgot-password" class="app-shell">
    <div id="toast" class="hidden"></div>
    <main class="mx-auto flex min-h-screen max-w-3xl items-center px-5 py-10">
      <section class="glass hero-card w-full p-8 lg:p-10">
        <a href="./login.html" class="text-sm font-semibold text-slate-500">← Back to login</a>
        <h1 class="font-display mt-6 text-4xl font-semibold">Reset your password</h1>
        <p class="mt-4 text-slate-500">Enter your email to receive a reset link. In demo mode, this interaction is simulated to keep the flow reviewable.</p>
        <form id="forgotForm" class="mt-8 space-y-4">
          <input name="email" type="email" placeholder="Email address" class="form-input" required />
          <button class="btn-primary w-full">Send Reset Link</button>
        </form>
      </section>
    </main>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>
